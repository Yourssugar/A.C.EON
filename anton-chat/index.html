<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АНТОН</title>
<style>
  :root {
    --bg: #060a07;
    --bg-panel: #0d140e;
    --bg-input: #0a100b;
    --green: #3dff8a;
    --green-dim: #1f6b3f;
    --green-soft: #2a5e3f;
    --text-muted: #5a9b76;
    --border: #163320;
    --glow: rgba(61, 255, 138, 0.35);
    --warn: #ff5d5d;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    color: var(--green);
    font-family: 'Consolas', 'JetBrains Mono', 'Courier New', monospace;
  }

  /* фоновая анимация "матрица" */
  #matrix {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: var(--bg);
  }

  /* лёгкий эффект CRT-сканлайнов поверх всего */
  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px
    );
    mix-blend-mode: multiply;
    z-index: 999;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
    background: var(--bg);
  }

  /* ---------- header ---------- */
  header {
    padding: 18px 0 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand { display: flex; align-items: baseline; gap: 12px; }

  .brand h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 8px var(--glow), 0 0 18px var(--glow);
    transition: text-shadow 0.05s, transform 0.05s;
  }

  @keyframes glitch {
    0%   { text-shadow: 0 0 8px var(--glow), 0 0 18px var(--glow); transform: translate(0,0); }
    20%  { text-shadow: -2px 0 #ff5d5d, 2px 0 #4dd9ff, 0 0 8px var(--glow); transform: translate(-1px,0); }
    40%  { text-shadow: 2px 0 #ff5d5d, -2px 0 #4dd9ff, 0 0 8px var(--glow); transform: translate(1px,0); }
    60%  { text-shadow: -1px 0 #4dd9ff, 1px 0 #ff5d5d, 0 0 8px var(--glow); transform: translate(0,0); }
    100% { text-shadow: 0 0 8px var(--glow), 0 0 18px var(--glow); transform: translate(0,0); }
  }

  .brand h1.glitch { animation: glitch 0.28s linear; }

  .brand .sub { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted); letter-spacing: 1px;
  }

  .status .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  .status.offline .dot {
    background: var(--text-muted); box-shadow: none;
    animation: none;
  }

  .status.busy .dot {
    background: var(--warn); box-shadow: 0 0 6px var(--warn);
    animation: pulse 0.8s infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* ---------- настройка адреса сервера ---------- */
  .server-config {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .server-config input {
    flex: 1;
    min-width: 200px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
  }

  .server-config input:focus { border-color: var(--green-soft); }

  .server-config button {
    background: transparent;
    border: 1px solid var(--green-soft);
    color: var(--text-muted);
    font-family: inherit;
    font-size: 12px;
    padding: 6px 10px;
    cursor: pointer;
    letter-spacing: 1px;
  }

  .server-config button:hover { color: var(--green); border-color: var(--green); }

  /* ---------- controls ---------- */
  .controls {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px;
  }

  .controls button {
    background: transparent;
    border: 1px solid var(--green-soft);
    color: var(--text-muted);
    font-family: inherit; font-size: 12px;
    padding: 5px 10px; cursor: pointer; letter-spacing: 1px;
    transition: all 0.15s ease;
  }

  .controls button:hover { color: var(--green); border-color: var(--green); box-shadow: 0 0 8px var(--glow); }

  .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }

  .switch {
    width: 32px; height: 16px;
    border: 1px solid var(--green-soft);
    border-radius: 8px; position: relative;
    transition: all 0.15s ease;
  }

  .switch::after {
    content: ""; position: absolute; top: 1px; left: 1px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--text-muted); transition: all 0.15s ease;
  }

  .switch.on { border-color: var(--green); box-shadow: 0 0 6px var(--glow); }
  .switch.on::after { left: 17px; background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* ---------- chat area ---------- */
  .chat {
    flex: 1; overflow-y: auto; padding: 20px 0;
    display: flex; flex-direction: column; gap: 16px;
  }

  .msg {
    max-width: 85%; line-height: 1.5; font-size: 14px;
    white-space: pre-wrap; word-wrap: break-word;
    animation: fadein 0.25s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg .label { display: block; font-size: 11px; letter-spacing: 2px; margin-bottom: 4px; color: var(--text-muted); }

  .msg.user {
    align-self: flex-end; background: var(--bg-panel);
    border: 1px solid var(--border); border-right: 2px solid var(--green-soft);
    padding: 8px 12px; color: #cdeedd;
  }

  .msg.user .label { text-align: right; }

  .msg.anton { align-self: flex-start; color: var(--green); text-shadow: 0 0 6px var(--glow); padding: 0 4px; }

  .msg.anton .text.thinking { color: var(--text-muted); text-shadow: none; }

  .msg.system { align-self: center; color: var(--text-muted); font-size: 12px; letter-spacing: 1px; text-align: center; }
  .msg.system.warn { color: var(--warn); }

  .cursor {
    display: inline-block; width: 8px; height: 14px;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: blink 1s steps(1) infinite;
    vertical-align: text-bottom; margin-left: 2px;
  }

  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }

  /* ---------- input area ---------- */
  .input-row {
    border-top: 1px solid var(--border); padding: 14px 0;
    display: flex; align-items: flex-end; gap: 10px;
  }

  .prompt-arrow { font-size: 16px; color: var(--green); text-shadow: 0 0 6px var(--glow); padding-bottom: 8px; }

  textarea#input {
    flex: 1; background: var(--bg-input); border: 1px solid var(--border);
    color: var(--green); font-family: inherit; font-size: 14px;
    padding: 8px 10px; resize: none; max-height: 120px; outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }

  textarea#input:focus { border-color: var(--green-soft); box-shadow: 0 0 8px var(--glow); }
  textarea#input::placeholder { color: var(--green-soft); }
  textarea#input:disabled { opacity: 0.4; }

  button#send {
    background: transparent; border: 1px solid var(--green); color: var(--green);
    font-family: inherit; font-size: 13px; letter-spacing: 2px;
    padding: 9px 16px; cursor: pointer; transition: all 0.15s ease;
    text-shadow: 0 0 6px var(--glow);
  }

  button#send:hover:not(:disabled) { background: var(--green-dim); box-shadow: 0 0 12px var(--glow); }
  button#send:disabled { opacity: 0.35; cursor: default; }

  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-thumb { background: var(--green-soft); border-radius: 3px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="app">

  <header>
    <div class="brand">
      <h1 id="title">АНТОН</h1>
      <span class="sub">статус: автономный модуль</span>
    </div>
    <div class="status offline" id="status">
      <span class="dot"></span>
      <span id="statusText">НЕ ПОДКЛЮЧЕНО</span>
    </div>
  </header>

  <div class="server-config">
    <span>адрес сервера:</span>
    <input id="serverUrl" type="text" placeholder="https://xxxx.trycloudflare.com">
    <button id="connectBtn">подключиться</button>
  </div>

  <div class="controls">
    <div class="toggle" id="thinkToggle">
      <div class="switch" id="thinkSwitch"></div>
      <span id="thinkLabel">режим размышления: выкл</span>
    </div>
    <button id="clearBtn">очистить диалог</button>
  </div>

  <div class="chat" id="chat">
    <div class="msg system">— укажи адрес сервера и нажми "подключиться" —</div>
  </div>

  <div class="input-row">
    <span class="prompt-arrow">&gt;</span>
    <textarea id="input" rows="1" placeholder="Сначала подключись к серверу..." disabled></textarea>
    <button id="send" disabled>ОТПРАВИТЬ</button>
  </div>

</div>

<script>
/* ===================== ФОН: ЦИФРОВОЙ ДОЖДЬ ===================== */
(function () {
  const canvas = document.getElementById('matrix');
  const ctx = canvas.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソ012345789ANTON';
  const fontSize = 16;
  let columns, drops;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    columns = Math.floor(canvas.width / fontSize);
    drops = Array(columns).fill(0).map(() => Math.random() * -100);
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    ctx.fillStyle = 'rgba(6, 10, 7, 0.10)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'rgba(61, 255, 138, 0.35)';
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  setInterval(draw, 60);
})();

/* ===================== ГЛИТЧ ЗАГОЛОВКА ===================== */
(function () {
  const title = document.getElementById('title');
  function glitchOnce() {
    title.classList.add('glitch');
    setTimeout(() => title.classList.remove('glitch'), 280);
    setTimeout(glitchOnce, 6000 + Math.random() * 9000);
  }
  setTimeout(glitchOnce, 4000);
})();

/* ===================== ОСНОВНАЯ ЛОГИКА ЧАТА ===================== */
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clearBtn');
const thinkToggle = document.getElementById('thinkToggle');
const thinkSwitch = document.getElementById('thinkSwitch');
const thinkLabel = document.getElementById('thinkLabel');
const serverUrlInput = document.getElementById('serverUrl');
const connectBtn = document.getElementById('connectBtn');
const statusEl = document.getElementById('status');
const statusText = document.getElementById('statusText');

let API_BASE = '';
let thinkMode = false;
let busy = false;
let pollTimer = null;

const SPINNER_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];

function getSessionId() {
  let id = localStorage.getItem('anton_session_id');
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : 'sess-' + Math.random().toString(36).slice(2) + Date.now());
    localStorage.setItem('anton_session_id', id);
  }
  return id;
}
const sessionId = getSessionId();

const savedUrl = localStorage.getItem('anton_api_base');
if (savedUrl) serverUrlInput.value = savedUrl;

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'user') {
    div.innerHTML = '<span class="label">ТЫ</span>' + escapeHtml(text);
  } else if (role === 'anton') {
    div.innerHTML = '<span class="label">АНТОН</span><span class="text"></span>';
  } else {
    div.textContent = text;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* uiState: 'disconnected' | 'busy' | 'ready' */
function setUiState(uiState) {
  statusEl.classList.remove('offline', 'busy');

  if (uiState === 'ready') {
    statusText.textContent = 'ONLINE';
    input.disabled = false;
    sendBtn.disabled = busy;
    input.placeholder = 'Напиши что-нибудь Антону...';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } else if (uiState === 'busy') {
    statusEl.classList.add('busy');
    statusText.textContent = 'ЗАНЯТ';
    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = 'Антон сейчас общается с кем-то другим...';
    if (!pollTimer) pollTimer = setInterval(checkAvailability, 8000);
  } else {
    statusEl.classList.add('offline');
    statusText.textContent = 'НЕ ПОДКЛЮЧЕНО';
    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = 'Сначала подключись к серверу...';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }
}

async function checkAvailability() {
  try {
    const resp = await fetch(API_BASE + '/api/state?session_id=' + encodeURIComponent(sessionId));
    if (!resp.ok) throw new Error('bad response');
    const data = await resp.json();
    if (!data.busy) {
      addMessage('system', '— Антон свободен, можно общаться —');
      setUiState('ready');
      input.focus();
    }
  } catch (err) {
    // сервер пока недоступен - попробуем ещё раз позже
  }
}

async function connect() {
  let url = serverUrlInput.value.trim();
  if (!url) {
    addMessage('system warn', 'Введи адрес сервера.');
    return;
  }
  url = url.replace(/\/+$/, '');
  API_BASE = url;
  localStorage.setItem('anton_api_base', url);

  chat.innerHTML = '';
  addMessage('system', '— проверка соединения —');

  try {
    const resp = await fetch(API_BASE + '/api/state?session_id=' + encodeURIComponent(sessionId));
    if (!resp.ok) throw new Error('bad response');
    const data = await resp.json();

    thinkMode = !!data.think_mode;
    thinkSwitch.classList.toggle('on', thinkMode);
    thinkLabel.textContent = 'режим размышления: ' + (thinkMode ? 'вкл' : 'выкл');

    if (data.busy) {
      addMessage('system warn', '— Антон сейчас занят, общается с кем-то другим. Жди — проверка идёт автоматически —');
      setUiState('busy');
    } else {
      addMessage('system', '— соединение установлено —');
      setUiState('ready');
      input.focus();
    }
  } catch (err) {
    addMessage('system warn', '— не удалось подключиться. Проверь, что сервер и туннель запущены, и адрес указан верно —');
    setUiState('disconnected');
  }
}

connectBtn.addEventListener('click', connect);
serverUrlInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') connect();
});

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

async function sendMessage() {
  const text = input.value.trim();
  if (!text || busy || !API_BASE) return;

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  busy = true;
  sendBtn.disabled = true;

  const antonDiv = addMessage('anton', '');
  const textSpan = antonDiv.querySelector('.text');

  // анимация "размышления", пока не пришёл первый кусок ответа
  textSpan.classList.add('thinking');
  let spinnerIdx = 0;
  textSpan.textContent = SPINNER_FRAMES[0] + ' печатает...';
  const spinnerTimer = setInterval(() => {
    spinnerIdx = (spinnerIdx + 1) % SPINNER_FRAMES.length;
    textSpan.textContent = SPINNER_FRAMES[spinnerIdx] + ' печатает...';
  }, 90);

  let firstChunk = true;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  try {
    const resp = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId })
    });

    if (resp.status === 409) {
      clearInterval(spinnerTimer);
      antonDiv.remove();
      addMessage('system warn', '— Антон занят, общается с кем-то другим —');
      setUiState('busy');
      busy = false;
      return;
    }

    if (!resp.ok) throw new Error('bad response');

    const reader = resp.body.getReader();
    const decoder = new TextDecoder('utf-8');

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      if (chunk) {
        if (firstChunk) {
          clearInterval(spinnerTimer);
          textSpan.classList.remove('thinking');
          textSpan.textContent = '';
          antonDiv.appendChild(cursor);
          firstChunk = false;
        }
        textSpan.textContent += chunk;
        chat.scrollTop = chat.scrollHeight;
      }
    }
    if (firstChunk) {
      clearInterval(spinnerTimer);
      textSpan.classList.remove('thinking');
      textSpan.textContent = '...';
    }
  } catch (err) {
    clearInterval(spinnerTimer);
    textSpan.classList.remove('thinking');
    textSpan.textContent = '[Ошибка соединения с сервером]';
    setUiState('disconnected');
  } finally {
    cursor.remove();
    busy = false;
    if (statusEl.classList.contains('busy') === false && !statusEl.classList.contains('offline')) {
      sendBtn.disabled = false;
      input.focus();
    }
  }
}

clearBtn.addEventListener('click', async () => {
  if (!API_BASE) return;
  const resp = await fetch(API_BASE + '/api/reset', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: sessionId })
  });
  if (resp.status === 409) {
    addMessage('system warn', '— Антон занят, общается с кем-то другим —');
    return;
  }
  chat.innerHTML = '<div class="msg system">— диалог очищен —</div>';
});

thinkToggle.addEventListener('click', async () => {
  if (!API_BASE) return;
  const newValue = !thinkMode;
  const resp = await fetch(API_BASE + '/api/think_mode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled: newValue, session_id: sessionId })
  });
  if (resp.status === 409) {
    addMessage('system warn', '— Антон занят, общается с кем-то другим —');
    return;
  }
  thinkMode = newValue;
  thinkSwitch.classList.toggle('on', thinkMode);
  thinkLabel.textContent = 'режим размышления: ' + (thinkMode ? 'вкл' : 'выкл');
});

if (savedUrl) connect();
</script>

</body>
</html>
