<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRAGMENT_02 — A.C.EON Archive</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000a00;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Tahoma,Arial,sans-serif;font-size:11px;overflow:hidden;}

    /* Window */
    .win{width:calc(100vw - 16px);height:calc(100vh - 16px);background:#0a120a;border:2px solid;border-color:#1a3a1a #020802 #020802 #1a3a1a;box-shadow:1px 1px 0 #000;display:flex;flex-direction:column;}

    /* Title bar */
    .tb{background:#003800;padding:2px 4px 3px;display:flex;align-items:center;gap:4px;flex:0 0 auto;}
    .tb-ico{font-size:14px;line-height:1;filter:hue-rotate(60deg) saturate(3) brightness(0.85);}
    .tb-title{color:#00dd55;font-size:11px;font-weight:bold;flex:1;padding-left:2px;}
    .tb-btns{display:flex;gap:2px;}
    .tb-btn{width:17px;height:15px;background:#0f1f0f;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;font-size:9px;display:flex;align-items:center;justify-content:center;color:#00882a;font-family:Tahoma,Arial;cursor:default;}

    /* Menu bar */
    .mb{background:#0a120a;border-bottom:1px solid #1a3a1a;padding:1px 4px;display:flex;flex:0 0 auto;}
    .mi{padding:2px 8px;cursor:default;color:#009933;}
    .mi:hover{background:#003800;color:#00dd55;}

    /* Toolbar */
    .tlb{background:#0a120a;padding:3px 4px;border-bottom:1px solid #1a3a1a;display:flex;align-items:center;gap:3px;flex:0 0 auto;}
    .tlb-btn{padding:1px 8px;background:#0f1f0f;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;cursor:pointer;font-size:11px;font-family:Tahoma,Arial;color:#009933;}
    .tlb-btn:hover{background:#002200;color:#00dd55;}
    .tlb-btn:active{border-color:#010801 #1a3a1a #1a3a1a #010801;}
    .tlb-btn.dis{color:#003a18;cursor:default;background:#0a120a;}
    .tlb-sep{width:1px;height:20px;border-left:1px solid #0a200a;border-right:1px solid #1a3a1a;margin:0 4px;}
    .addr-box{flex:1;height:20px;border:1px solid;border-color:#010801 #1a3a1a #1a3a1a #010801;background:#020a02;padding:1px 4px;font-size:11px;font-family:'Courier New',monospace;color:#00cc44;white-space:nowrap;overflow:hidden;}

    /* Split */
    .main{display:flex;flex:1;overflow:hidden;position:relative;}
    .spl{width:4px;background:#0a120a;border-left:1px solid #010801;border-right:1px solid #1a3a1a;flex:0 0 4px;}

    /* Tree */
    .tree{width:190px;flex:0 0 auto;background:#020a02;border-right:1px solid #1a3a1a;overflow-y:auto;padding:4px 0;}
    .tree::-webkit-scrollbar{width:14px;}
    .tree::-webkit-scrollbar-track{background:#0a120a;border:1px solid #0a200a;}
    .tree::-webkit-scrollbar-thumb{background:#0f1f0f;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;}
    .t-row{display:flex;align-items:center;padding:1px 2px 1px 4px;cursor:default;white-space:nowrap;min-height:18px;color:#009933;}
    .t-row:hover{background:#003800;color:#00dd55;}
    .t-row.sel{background:#004400;color:#00ff55;}
    .t-toggle{width:12px;height:12px;border:1px solid #1a3a1a;background:#020a02;font-size:8px;display:inline-flex;align-items:center;justify-content:center;margin-right:3px;flex:0 0 12px;color:#00882a;}
    .t-ico{margin-right:4px;font-size:13px;}
    .t-name{font-size:11px;}
    .t-children{padding-left:14px;}

    /* File list */
    .fl{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .fl-head{display:flex;background:#0a120a;border-bottom:2px solid #010801;flex:0 0 auto;}
    .fh{padding:2px 6px;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;cursor:default;white-space:nowrap;color:#006622;font-size:11px;}
    .fh.fn{flex:1;}
    .fh.ft{width:130px;}
    .fh.fs{width:70px;text-align:right;}
    .fl-body{flex:1;overflow-y:auto;background:#020802;}
    .fl-body::-webkit-scrollbar{width:14px;}
    .fl-body::-webkit-scrollbar-track{background:#0a120a;}
    .fl-body::-webkit-scrollbar-thumb{background:#0f1f0f;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;}
    .fr{display:flex;align-items:center;padding:1px 6px;cursor:default;min-height:18px;color:#009933;}
    .fr:hover{background:#001800;color:#00dd55;}
    .fr.sel{background:#004400;color:#00ff55;}
    .fr .fi{margin-right:6px;flex:0 0 22px;display:flex;align-items:center;}
    .fr .fn{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:11px;}
    .fr .ft{width:130px;font-size:11px;}
    .fr .fs{width:70px;font-size:11px;text-align:right;padding-right:4px;}

    /* CSS folder icon */
    .ico-folder{display:inline-block;width:14px;height:11px;background:#00aa33;position:relative;border-radius:0 1px 1px 1px;}
    .ico-folder::before{content:'';position:absolute;top:-3px;left:0;width:5px;height:3px;background:#00aa33;border-radius:1px 1px 0 0;}
    .ico-tag{display:inline-block;font-size:8px;font-weight:bold;padding:0 2px;border:1px solid;font-family:'Courier New',monospace;}
    .ico-img{color:#00cc44;border-color:#006622;}
    .ico-mp3{color:#00aa33;border-color:#005520;}
    .ico-txt{color:#009933;border-color:#004a18;}

    /* Status bar */
    .sb{border-top:1px solid #1a3a1a;padding:2px 4px;display:flex;gap:4px;flex:0 0 auto;background:#0a120a;}
    .sp{border:1px solid;border-color:#010801 #1a3a1a #1a3a1a #010801;padding:1px 6px;font-size:11px;color:#006622;}

    /* Preview dialog */
    .ov{display:none;position:absolute;inset:0;background:rgba(0,10,0,0.6);z-index:50;align-items:center;justify-content:center;}
    .ov.show{display:flex;}
    .pv{background:#0a120a;border:2px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;max-width:580px;width:90%;max-height:80vh;display:flex;flex-direction:column;box-shadow:2px 2px 8px rgba(0,0,0,0.8);}
    .pv-tb{background:#003800;padding:2px 4px 3px;display:flex;align-items:center;}
    .pv-t{color:#00dd55;font-size:11px;font-weight:bold;flex:1;}
    .pv-x{width:17px;height:15px;background:#0f1f0f;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;color:#00882a;}
    .pv-x:hover{background:#440000;color:#ff4444;}
    .pv-body{padding:12px;overflow-y:auto;flex:1;min-height:80px;background:#020a02;}
    .pv-txt{font-family:'Courier New',monospace;font-size:12px;white-space:pre-wrap;color:#00cc44;line-height:1.7;}
    .pv-img{max-width:100%;max-height:380px;display:block;margin:0 auto;}
    .pv-aud{width:100%;margin-top:8px;}
    .pv-ph{text-align:center;padding:24px 16px;color:#005522;font-size:11px;line-height:1.8;font-family:'Courier New',monospace;}
    .pv-ph .ph-ico{font-size:28px;display:block;margin-bottom:12px;filter:hue-rotate(60deg) saturate(3);}
    .pv-ft{padding:6px 10px;border-top:1px solid #1a3a1a;display:flex;justify-content:flex-end;gap:6px;flex:0 0 auto;background:#0a120a;}
    .pv-btn{padding:2px 18px;background:#0f1f0f;border:1px solid;border-color:#1a3a1a #010801 #010801 #1a3a1a;cursor:pointer;font-size:11px;font-family:Tahoma,Arial;color:#009933;}
    .pv-btn:hover{background:#003800;color:#00dd55;}
    .pv-btn:active{border-color:#010801 #1a3a1a #1a3a1a #010801;}
  </style>
</head>
<body>
<div class="win">
  <div class="tb">
    <span class="tb-ico">&#128193;</span>
    <span class="tb-title" id="win-title">FRAGMENT_02 — A.C.EON Archive</span>
    <div class="tb-btns">
      <div class="tb-btn" title="Minimize">_</div>
      <div class="tb-btn" title="Maximize">&#9633;</div>
      <div class="tb-btn" title="Close">&#10005;</div>
    </div>
  </div>

  <div class="mb">
    <span class="mi">File</span>
    <span class="mi">Edit</span>
    <span class="mi">View</span>
    <span class="mi">Favorites</span>
    <span class="mi">Help</span>
  </div>

  <div class="tlb">
    <button class="tlb-btn dis" id="btn-back">&#9664; Back</button>
    <button class="tlb-btn dis" id="btn-fwd">Forward &#9654;</button>
    <button class="tlb-btn" id="btn-up">&#9650; Up</button>
    <div class="tlb-sep"></div>
    <span style="font-size:11px;padding:0 4px;color:#006622;">Address</span>
    <div class="addr-box" id="addr">C:\ACEON\ARCHIVE\FRAGMENT_02\</div>
  </div>

  <div class="main" id="main-area">
    <div class="tree" id="tree-panel"></div>
    <div class="spl"></div>
    <div class="fl">
      <div class="fl-head">
        <div class="fh fn">Name</div>
        <div class="fh ft">Type</div>
        <div class="fh fs">Size</div>
      </div>
      <div class="fl-body" id="fl-body"></div>
    </div>

    <div class="ov" id="ov">
      <div class="pv">
        <div class="pv-tb">
          <span class="pv-t" id="pv-title">Preview</span>
          <div class="pv-x" onclick="closePv()">&#10005;</div>
        </div>
        <div class="pv-body" id="pv-body"></div>
        <div class="pv-ft">
          <a class="pv-btn" id="pv-dl" style="display:none;text-decoration:none;color:#009933;">Download</a>
          <button class="pv-btn" onclick="closePv()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <div class="sb">
    <div class="sp" id="sb-n">0 objects</div>
    <div class="sp" id="sb-i">A.C.EON ARCHIVE — FRAGMENT_02</div>
  </div>
</div>

<script>
(function(){
  if(!sessionStorage.getItem('aceon_library')){window.location.href='../';}

// ════════════════════════════════════════════════════════════
// ФАЙЛЫ — добавляй сюда. url:null = ещё не загружен.
// url:'visuals/file.jpg' = реальный файл в папке fragment02/
// ════════════════════════════════════════════════════════════
var FS={name:'FRAGMENT_02',type:'folder',children:[
  {name:'VISUALS',type:'folder',children:[
    {name:'draft_concept_01.jpg',type:'image',size:'--',url:null},
    {name:'draft_concept_02.jpg',type:'image',size:'--',url:null},
    {name:'rejected_gen_01.jpg', type:'image',size:'--',url:null},
    {name:'rejected_gen_02.jpg', type:'image',size:'--',url:null},
  ]},
  {name:'AUDIO_RAW',type:'folder',children:[
    {name:'session_raw_01.mp3', type:'audio',size:'--',url:null},
    {name:'loop_unused_01.mp3',type:'audio',size:'--',url:null},
  ]},
  {name:'PROMPTS',type:'folder',children:[
    {name:'visual_prompts.txt',type:'text',size:'--',url:null},
    {name:'suno_prompts.txt',  type:'text',size:'--',url:null},
  ]},
  {name:'NOTES',type:'folder',children:[
    {name:'concept_notes.txt',       type:'text',size:'--',url:null},
    {name:'creator_reflections.txt', type:'text',size:'--',url:null},
  ]},
  {name:'README.TXT',type:'text',size:'1 KB',url:null,
   content:'A.C.EON STUDIO \u2014 FRAGMENT_02 ARCHIVE\n================================\n\nThis directory contains working materials\nfrom the production of FRAGMENT_02.\n\nAll files were created during development.\nSome were used. Most were not.\n\nIf you are reading this \u2014\nyou found what was not meant to be hidden,\nbut was never meant to be easy.\n\n\u2014 A.C.EON NODE'},
]};
// ════════════════════════════════════════════════════════════

var stack=[FS],hist=[[FS]],hi=0,selItem=null;
function cur(){return stack[stack.length-1];}

function typeLabel(t){return{folder:'File Folder',image:'Image File',audio:'Audio File',text:'Text Document'}[t]||'File';}
function getFolder(item){return{image:'visuals/',audio:'audio/',text:item.name.includes('prompt')?'prompts/':'notes/'}[item.type]||'';}

function pathStr(){
  var p='C:\\ACEON\\ARCHIVE\\';
  stack.forEach(function(f){p+=f.name+'\\';});
  return p;
}

function render(){
  document.getElementById('addr').textContent=pathStr();
  document.getElementById('win-title').textContent=cur().name+' \u2014 A.C.EON Archive';
  updateNav();renderTree();renderFiles();updateSb();
}

function enterFolder(f){stack.push(f);hist.splice(hi+1);hist.push(stack.slice());hi=hist.length-1;selItem=null;render();}
function goUp(){if(stack.length>1){stack.pop();selItem=null;render();}}
function goBack(){if(hi>0){hi--;stack=hist[hi].slice();selItem=null;render();}}
function goFwd(){if(hi<hist.length-1){hi++;stack=hist[hi].slice();selItem=null;render();}}

function updateNav(){
  var bb=document.getElementById('btn-back');
  var fb=document.getElementById('btn-fwd');
  var ub=document.getElementById('btn-up');
  bb.className='tlb-btn'+(hi>0?'':' dis'); bb.onclick=hi>0?goBack:null;
  fb.className='tlb-btn'+(hi<hist.length-1?'':' dis'); fb.onclick=hi<hist.length-1?goFwd:null;
  ub.className='tlb-btn'+(stack.length>1?'':' dis'); ub.onclick=stack.length>1?goUp:null;
}

// ── FOLDER ICON (CSS-drawn) ──
function makeFolderIco(){
  var s=document.createElement('span');s.className='ico-folder';return s;
}
function makeFileIco(type){
  var s=document.createElement('span');s.className='ico-tag';
  if(type==='image'){s.classList.add('ico-img');s.textContent='IMG';}
  else if(type==='audio'){s.classList.add('ico-mp3');s.textContent='MP3';}
  else{s.classList.add('ico-txt');s.textContent='TXT';}
  return s;
}

// ── TREE ──
function renderTree(){
  var panel=document.getElementById('tree-panel');panel.innerHTML='';
  renderNode(panel,FS,0);
}
function renderNode(parent,node,depth){
  if(node.type!=='folder')return;
  var wrap=document.createElement('div');
  var row=document.createElement('div');
  row.className='t-row'+(stack.indexOf(node)>=0?' sel':'');
  row.style.paddingLeft=(4+depth*14)+'px';

  var hasFolders=node.children&&node.children.some(function(c){return c.type==='folder';});
  var sp=document.createElement('span');
  if(hasFolders){sp.className='t-toggle';sp.textContent='-';}
  else{sp.style.cssText='display:inline-block;width:14px;';}
  row.appendChild(sp);

  var ic=document.createElement('span');ic.className='t-ico';ic.appendChild(makeFolderIco());
  var nm=document.createElement('span');nm.className='t-name';nm.textContent=' '+node.name;
  row.appendChild(ic);row.appendChild(nm);
  row.addEventListener('click',function(){var p=findPath(FS,node);if(p){stack=p;selItem=null;render();}});
  wrap.appendChild(row);

  if(node.children){
    var ch=document.createElement('div');ch.className='t-children';
    node.children.forEach(function(c){renderNode(ch,c,0);});
    wrap.appendChild(ch);
  }
  parent.appendChild(wrap);
}
function findPath(root,target){
  if(root===target)return[root];
  if(!root.children)return null;
  for(var i=0;i<root.children.length;i++){var p=findPath(root.children[i],target);if(p)return[root].concat(p);}
  return null;
}

// ── FILE LIST ──
function renderFiles(){
  var body=document.getElementById('fl-body');body.innerHTML='';
  (cur().children||[]).forEach(function(item){
    var row=document.createElement('div');row.className='fr';
    var fi=document.createElement('span');fi.className='fi';
    fi.appendChild(item.type==='folder'?makeFolderIco():makeFileIco(item.type));
    var fn=document.createElement('span');fn.className='fn';fn.textContent=' '+item.name;
    var ft=document.createElement('span');ft.className='ft';ft.textContent=typeLabel(item.type);
    var fs=document.createElement('span');fs.className='fs';fs.textContent=item.type==='folder'?'':item.size||'--';
    row.appendChild(fi);row.appendChild(fn);row.appendChild(ft);row.appendChild(fs);
    row.addEventListener('click',function(){
      document.querySelectorAll('.fr.sel').forEach(function(r){r.classList.remove('sel');});
      row.classList.add('sel');selItem=item;updateSb();
    });
    row.addEventListener('dblclick',function(){if(item.type==='folder')enterFolder(item);else openFile(item);});
    body.appendChild(row);
  });
}

// ── STATUS ──
function updateSb(){
  var c=(cur().children||[]).length;
  document.getElementById('sb-n').textContent=c+' object'+(c!==1?'s':'');
  document.getElementById('sb-i').textContent=selItem?selItem.name+' \u2014 '+typeLabel(selItem.type):'A.C.EON ARCHIVE \u2014 FRAGMENT_02';
}

// ── PREVIEW ──
function openFile(item){
  var pvT=document.getElementById('pv-title');
  var pvB=document.getElementById('pv-body');
  var pvDl=document.getElementById('pv-dl');
  pvT.textContent=item.name;pvB.innerHTML='';pvDl.style.display='none';

  if(item.content){
    var pre=document.createElement('pre');pre.className='pv-txt';pre.textContent=item.content;pvB.appendChild(pre);
  } else if(!item.url){
    pvB.innerHTML='<div class="pv-ph"><span class="ph-ico">&#128194;</span>FILE NOT YET UPLOADED<br><br><span style="color:#003a14;font-size:10px;">Upload to: fragment02/'+getFolder(item)+item.name+'</span></div>';
  } else if(item.type==='image'){
    var img=document.createElement('img');img.src=item.url;img.className='pv-img';
    img.onerror=function(){pvB.innerHTML='<div class="pv-ph">Image could not be loaded.</div>';};
    pvB.appendChild(img);pvDl.href=item.url;pvDl.download=item.name;pvDl.style.display='';
  } else if(item.type==='audio'){
    var aud=document.createElement('audio');aud.controls=true;aud.className='pv-aud';aud.src=item.url;pvB.appendChild(aud);
    pvDl.href=item.url;pvDl.download=item.name;pvDl.style.display='';
  } else {
    fetch(item.url).then(function(r){return r.text();}).then(function(t){
      var pre=document.createElement('pre');pre.className='pv-txt';pre.textContent=t;pvB.appendChild(pre);
    }).catch(function(){pvB.innerHTML='<div class="pv-ph">Could not load file.</div>';});
    pvDl.href=item.url;pvDl.download=item.name;pvDl.style.display='';
  }
  document.getElementById('ov').classList.add('show');
}
function closePv(){document.getElementById('ov').classList.remove('show');}
window.closePv=closePv;
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closePv();});

render();
})();
</script>
</body>
</html>
