<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A.C.EON — IDOLLS</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#ede6d4;
  min-height:100vh;
  font-family:'Cormorant Garamond',Georgia,serif;
  overflow-x:hidden;
}

/* divine light */
body::before{
  content:'';
  position:fixed;
  top:0;left:50%;transform:translateX(-50%);
  width:80%;height:65vh;
  background:radial-gradient(ellipse 60% 100% at 50% 0%,rgba(255,245,200,0.75) 0%,rgba(255,230,160,0.3) 40%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* sacred geometry bg */
.geo{position:fixed;inset:0;pointer-events:none;z-index:0;}

/* header */
header{
  position:relative;z-index:10;
  text-align:center;padding:44px 20px 20px;
}

.rosette{width:54px;height:54px;margin:0 auto 18px;}

.site-lbl{
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:7px;color:#8a6c3a;margin-bottom:10px;
}

.pg-title{
  font-family:'Cinzel',serif;
  font-size:24px;font-weight:700;letter-spacing:10px;color:#2a1e0e;
}

.gold-line{
  width:260px;height:1px;margin:14px auto;
  background:linear-gradient(90deg,transparent,#c9a045 25%,#e8d070 50%,#c9a045 75%,transparent);
}

.pg-sub{
  font-style:italic;font-size:13px;
  letter-spacing:3px;color:#9a7d4a;
}

/* bookshelf wrap */
.shelf-wrap{
  position:relative;z-index:10;
  max-width:860px;margin:10px auto 50px;
  padding:0 24px;
}

/* arch top of bookcase */
.case-arch{
  height:38px;
  background:linear-gradient(180deg,#3c2812 0%,#4e3420 100%);
  border-radius:50% 50% 0 0/100% 100% 0 0;
  box-shadow:0 -2px 0 #c9a045,0 6px 14px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;
}
.case-arch::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(201,160,69,0.1) 18px,rgba(201,160,69,0.1) 19px);
}

/* main case body */
.case-body{
  background:#e6dcbf;
  border-left:10px solid #4e3420;
  border-right:10px solid #4e3420;
  padding:22px 18px 0;
  position:relative;
  box-shadow:-6px 0 18px rgba(0,0,0,0.2),6px 0 18px rgba(0,0,0,0.2);
}
.case-body::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,245,200,0.35) 0%,transparent 50%);
}
.case-body::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#c9a045,#e8d070,#c9a045,transparent);
}

.case-foot{
  height:14px;
  background:linear-gradient(180deg,#5a3820 0%,#3a2210 100%);
  border-left:10px solid #3a2210;
  border-right:10px solid #3a2210;
  border-bottom:4px solid #261608;
  box-shadow:0 8px 22px rgba(0,0,0,0.45);
}

/* shelf rows */
.shelf-row{position:relative;margin-bottom:0;}
.shelf-row+.shelf-row{margin-top:24px;}

.books-row{
  display:flex;align-items:flex-end;
  gap:5px;padding:0 6px;
  min-height:195px;position:relative;z-index:2;
}

.shelf-plank{
  height:15px;margin:0 -6px;
  background:linear-gradient(180deg,#9e7444 0%,#7c5232 35%,#6a4222 65%,#5a3618 100%);
  position:relative;z-index:3;
  box-shadow:0 6px 16px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);
}
.shelf-plank::before{
  content:'';position:absolute;
  bottom:-8px;left:0;right:0;height:8px;
  background:#3a2010;
  box-shadow:0 4px 8px rgba(0,0,0,0.4);
}

/* ── BOOKS ── */
.book{
  position:relative;cursor:pointer;
  border-radius:1px 3px 3px 1px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow 0.3s ease,filter 0.3s ease;
  box-shadow:
    -3px 3px 0 rgba(0,0,0,0.4),
    -4px 5px 12px rgba(0,0,0,0.3),
    inset -4px 0 8px rgba(0,0,0,0.3),
    inset 1px 0 0 rgba(255,255,255,0.07);
  overflow:hidden;
  user-select:none;
}

/* shimmer sweep */
.book::before{
  content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(108deg,transparent 35%,rgba(255,248,210,0.13) 50%,transparent 65%);
  background-size:200% 100%;
  animation:sweep 4s ease-in-out infinite;
  animation-delay:var(--sd,0s);
}
@keyframes sweep{0%,100%{background-position:180% 0;}50%{background-position:-80% 0;}}

/* gilt top */
.b-gilt{
  position:absolute;top:0;left:0;right:0;height:4px;z-index:4;
  background:linear-gradient(90deg,rgba(160,120,40,0.6),rgba(220,185,80,0.9),rgba(160,120,40,0.6));
}
/* gilt bottom */
.b-gilt2{
  position:absolute;bottom:0;left:0;right:0;height:3px;z-index:4;
  background:linear-gradient(90deg,rgba(140,100,30,0.4),rgba(200,160,60,0.7),rgba(140,100,30,0.4));
}
/* binding */
.b-bind{
  position:absolute;left:7px;top:4px;bottom:3px;width:1px;z-index:4;
  background:rgba(0,0,0,0.2);
}
/* label */
.b-lbl{
  writing-mode:vertical-lr;text-orientation:mixed;
  transform:rotate(180deg);
  font-family:'Cinzel',serif;
  font-size:9px;font-weight:600;letter-spacing:2px;
  color:rgba(255,255,255,0.75);
  text-shadow:0 1px 3px rgba(0,0,0,0.7);
  position:relative;z-index:5;
  white-space:nowrap;
}

.book:hover{
  transform:translateY(-20px) rotate(-1.5deg);
  box-shadow:
    -2px 20px 0 rgba(0,0,0,0.2),
    -4px 22px 18px rgba(0,0,0,0.35),
    inset -4px 0 8px rgba(0,0,0,0.3),
    0 0 28px rgba(201,160,69,0.22);
  filter:brightness(1.1);
}
.book:active{transform:translateY(-10px) rotate(-0.5deg);}

/* ── MODAL ── */
.modal-ov{
  position:fixed;inset:0;
  background:rgba(18,10,2,0.7);
  z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease;
}
.modal-ov.open{opacity:1;pointer-events:auto;}

.modal-box{
  background:#f5eedd;
  width:460px;max-width:90vw;
  padding:42px 46px 36px;
  position:relative;
  border-top:3px solid #c9a045;
  box-shadow:0 28px 70px rgba(0,0,0,0.5);
  transform:scale(0.9) translateY(16px);
  transition:transform 0.32s cubic-bezier(0.34,1.3,0.64,1);
}
.modal-ov.open .modal-box{transform:scale(1) translateY(0);}

.modal-box::before{
  content:'';position:absolute;
  top:9px;left:9px;right:9px;bottom:9px;
  border:1px solid rgba(185,148,55,0.25);pointer-events:none;
}

.modal-box::after{
  content:'✦';position:absolute;
  top:13px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#c9a045;opacity:0.55;
}

.m-icon{text-align:center;font-size:26px;margin-bottom:10px;opacity:0.65;}
.m-title{
  font-family:'Cinzel',serif;
  font-size:16px;font-weight:700;letter-spacing:7px;
  color:#2a1e0e;text-align:center;margin-bottom:8px;
}
.m-hr{
  height:1px;margin:16px 0;
  background:linear-gradient(90deg,transparent,#c9a045 25%,#e8d070 50%,#c9a045 75%,transparent);
}
.m-empty{
  text-align:center;font-style:italic;
  font-size:13px;color:#8a6c3a;
  letter-spacing:2px;line-height:2.1;padding:6px 0 12px;
}
.m-close{
  position:absolute;top:12px;right:18px;
  background:none;border:none;
  font-size:20px;color:#9a7d4a;cursor:pointer;
  font-family:'Cinzel',serif;line-height:1;padding:4px;
  transition:color 0.15s;
}
.m-close:hover{color:#2a1e0e;}

/* node indicator */
#nd{
  position:fixed;top:14px;right:18px;
  font-family:'Cinzel',serif;
  font-size:9px;letter-spacing:3px;
  text-align:right;line-height:2.2;
  color:#b8902a;opacity:0.5;
  pointer-events:none;z-index:50;
}

.back-btn{
  position:fixed;bottom:20px;left:22px;
  font-family:'Cinzel',serif;font-size:9px;
  letter-spacing:4px;color:#8a6c3a;opacity:0.45;
  z-index:50;cursor:pointer;
  background:none;border:none;
  transition:opacity 0.2s;
}
.back-btn:hover{opacity:0.9;}

.footer{
  text-align:center;font-style:italic;
  font-size:11px;letter-spacing:3px;
  color:#9a7d4a;opacity:0.5;
  padding-bottom:30px;
  position:relative;z-index:10;
}
</style>
</head>
<body>

<!-- geo bg -->
<div class="geo">
<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rg" cx="50%" cy="0%" r="65%">
      <stop offset="0%" stop-color="#c9a045" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c9a045" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#rg)"/>
  <g transform="translate(50%,0)" stroke="#c9a045" fill="none" stroke-width="0.5" opacity="0.07">
    <ellipse cx="0" cy="0" rx="100" ry="100"/>
    <ellipse cx="0" cy="0" rx="180" ry="180"/>
    <ellipse cx="0" cy="0" rx="270" ry="270"/>
    <ellipse cx="0" cy="0" rx="370" ry="370"/>
  </g>
  <line x1="20%" y1="0" x2="20%" y2="100%" stroke="#c9a045" stroke-width="0.4" opacity="0.05"/>
  <line x1="80%" y1="0" x2="80%" y2="100%" stroke="#c9a045" stroke-width="0.4" opacity="0.05"/>
</svg>
</div>

<header>
  <div class="rosette">
    <svg viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#c9a045" stroke-width="0.8" opacity="0.6">
      <circle cx="27" cy="27" r="23"/><circle cx="27" cy="27" r="14"/><circle cx="27" cy="27" r="5"/>
      <line x1="27" y1="4"  x2="27" y2="50"/>
      <line x1="4"  y1="27" x2="50" y2="27"/>
      <line x1="11" y1="11" x2="43" y2="43"/>
      <line x1="43" y1="11" x2="11" y2="43"/>
    </svg>
  </div>
  <div class="site-lbl">A.C.EON STUDIO</div>
  <div class="pg-title">IDOLLS</div>
  <div class="gold-line"></div>
  <div class="pg-sub">archive of fragments — access granted</div>
</header>

<div class="shelf-wrap">
  <div class="case-arch"></div>
  <div class="case-body">
    <div class="shelf-row">
      <div class="books-row" id="row1"></div>
      <div class="shelf-plank"></div>
    </div>
    <div class="shelf-row">
      <div class="books-row" id="row2"></div>
      <div class="shelf-plank"></div>
    </div>
  </div>
  <div class="case-foot"></div>
</div>

<div class="footer">✦ &nbsp; per aspera ad astra &nbsp; ✦</div>

<div class="modal-ov" id="modal">
  <div class="modal-box">
    <button class="m-close" id="mclose">✕</button>
    <div class="m-icon" id="micon"></div>
    <div class="m-title" id="mtitle"></div>
    <div class="m-hr"></div>
    <div class="m-empty">
      // архив пуст //<br>
      <span style="font-size:11px;opacity:0.7;letter-spacing:1px;">содержимое появится позже</span>
    </div>
    <div class="m-hr"></div>
  </div>
</div>

<div id="nd">✦ A.C.EON NODE<br>IDOLLS — ACTIVE<br>ACCESS: FULL</div>
<button class="back-btn" onclick="history.back()">← НАЗАД</button>

<script>
(function(){
  if(sessionStorage.getItem('aceon_idolls')!=='granted'){window.location.href='../'; return;}

  var BOOKS = [
    {n:'ВИДЕО',       ic:'▶', c:'#6e1c1c', w:56, h:200, sd:'0s'   },
    {n:'АУДИО',       ic:'♪', c:'#1c2660', w:48, h:182, sd:'0.7s' },
    {n:'ССЫЛКИ',      ic:'⬡', c:'#1c4428', w:62, h:216, sd:'1.3s' },
    {n:'РАЗМЫШЛЕНИЯ', ic:'◈', c:'#3c1c54', w:44, h:194, sd:'1.9s' },
    {n:'МЕДВЕДЬ',     ic:'◉', c:'#4a2e12', w:66, h:204, sd:'0.3s' },
    {n:'A.C.EON',     ic:'⬡', c:'#3a3010', w:54, h:188, sd:'1.0s' },
    {n:'YOUTUBE',     ic:'▶', c:'#5a1428', w:50, h:220, sd:'1.6s' },
  ];

  function adj(hex, d){
    var r=parseInt(hex.slice(1,3),16),
        g=parseInt(hex.slice(3,5),16),
        b=parseInt(hex.slice(5,7),16);
    r=Math.min(255,Math.max(0,r+d));
    g=Math.min(255,Math.max(0,g+d));
    b=Math.min(255,Math.max(0,b+d));
    return '#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
  }

  function makeBook(b){
    var el=document.createElement('div');
    el.className='book';
    el.style.width=b.w+'px';
    el.style.height=b.h+'px';
    el.style.background='linear-gradient(175deg,'+adj(b.c,22)+' 0%,'+b.c+' 45%,'+adj(b.c,-18)+' 100%)';
    el.style.setProperty('--sd',b.sd);

    var gilt=document.createElement('div');gilt.className='b-gilt';
    var gilt2=document.createElement('div');gilt2.className='b-gilt2';
    var bind=document.createElement('div');bind.className='b-bind';
    var lbl=document.createElement('div');lbl.className='b-lbl';
    lbl.textContent=b.n;

    el.appendChild(gilt);
    el.appendChild(gilt2);
    el.appendChild(bind);
    el.appendChild(lbl);

    el.addEventListener('click',function(){open(b);});
    return el;
  }

  var r1=document.getElementById('row1');
  var r2=document.getElementById('row2');
  BOOKS.slice(0,4).forEach(function(b){r1.appendChild(makeBook(b));});
  BOOKS.slice(4).forEach(function(b){r2.appendChild(makeBook(b));});

  var ov=document.getElementById('modal');

  function open(b){
    document.getElementById('micon').textContent=b.ic;
    document.getElementById('mtitle').textContent=b.n;
    ov.classList.add('open');
  }
  function close(){ov.classList.remove('open');}

  document.getElementById('mclose').addEventListener('click',close);
  ov.addEventListener('click',function(e){if(e.target===ov)close();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});

  document.body.style.opacity='0';
  document.body.style.transition='opacity 0.9s ease';
  setTimeout(function(){document.body.style.opacity='1';},60);

})();
</script>
</body>
</html>
